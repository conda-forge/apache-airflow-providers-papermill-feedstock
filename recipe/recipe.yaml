context:
  name: apache-airflow-providers-papermill
  version: 3.13.1

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/apache_airflow_providers_papermill-${{ version }}.tar.gz
  sha256: c0ee0280354cfd1b2b305cc67889fdfcdaaa5496ebb0f494577d05b86b0908ec

build:
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - flit-core ==3.12.0
  run:
    - python >=${{ python_min }}
    - apache-airflow >=2.11.0
    - apache-airflow-providers-common-compat >=1.8.0
    - papermill >=2.6.0
    - scrapbook >=0.5.0
    - ipykernel >=6.29.4
    - pandas >=2.1.2
    - nbconvert >=7.16.1
tests:
  - python:
      imports:
        - airflow.providers.papermill
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - '*'

about:
  homepage: https://github.com/apache/airflow/
  summary: Provider package apache-airflow-providers-papermill for Apache Airflow
  license: Apache-2.0
  license_file:
    - LICENSE
    - NOTICE
  documentation: https://airflow.apache.org/docs/apache-airflow-providers-papermill/stable/index.html
  repository: https://github.com/apache/airflow/

extra:
  recipe-maintainers:
    - xylar
